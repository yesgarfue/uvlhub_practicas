name: Deploy to Render

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Configurar Docker para producción
      - name: Set up Docker
        run: |
          echo "Setting up Docker Compose for production"
          cp .env.docker.example .env
          docker-compose -f docker/docker-compose.prod.yml build

      # 3. Subir las imágenes de Docker a Render
      - name: Push to Render Registry
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          docker-compose -f docker/docker-compose.prod.yml push

      # 4. Desplegar el servicio en Render
      - name: Deploy on Render
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
